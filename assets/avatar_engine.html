<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e26;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background:radial-gradient(ellipse at 50% 45%,rgba(50,80,180,0.08) 0%,transparent 60%)}
#speak-ring{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  opacity:0;transition:opacity 0.5s;
  background:radial-gradient(ellipse at 50% 50%,transparent 36%,rgba(80,140,255,0.15) 42%,transparent 48%);
  animation:pulseRing 2.5s ease-in-out infinite}
@keyframes pulseRing{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
#speak-ring.active{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="glow"></div>
<div id="speak-ring"></div>
<script>
// =====================================================================
// TRUE 10/10 DYNAMIC ANIMATION ENGINE (Live2D-style Skeletal Rigging)
//
// This engine uses ONLY the single base image (presenter_base.jpg).
// It generates a dense WebGL mesh and rigs it with virtual bones.
// 
// Features:
// 1. Arm/Shoulder movement (gestures) via vertex rotation.
// 2. Head sway/tilt via neck bone rotation.
// 3. Jaw drop and lip deformation mapped to text visemes.
// 4. Eye blinking (squashing vertex Y-coords in the eye region).
// =====================================================================

const imgPath = '../presenter_base.jpg';
const GRID_W = 40, GRID_H = 60;
const CHARS_PER_SEC = 13;

// --- Shaders ---
const VS = `
attribute vec2 a_pos; // Original position in pixels
attribute vec2 a_uv;
uniform vec2 u_res;
uniform vec2 u_off;
uniform float u_scale;

// Deformation parameters
uniform vec2 u_head_center;
uniform float u_head_angle;
uniform vec2 u_shoulderL;
uniform vec2 u_shoulderR;
uniform float u_armL_angle;
uniform float u_armR_angle;

uniform vec2 u_jaw;
uniform float u_jaw_drop;
uniform vec2 u_eyeL;
uniform vec2 u_eyeR;
uniform float u_blink;
uniform float u_breath;

varying vec2 v_uv;

vec2 rotateAround(vec2 p, vec2 center, float angle) {
    float s = sin(angle);
    float c = cos(angle);
    p -= center;
    return vec2(p.x * c - p.y * s, p.x * s + p.y * c) + center;
}

void main(){
    vec2 p = a_pos;

    // 1. Breathing (chest expansion)
    if(p.y > u_shoulderL.y) {
        float bW = (p.y - u_shoulderL.y) / (1200.0 * 0.5);
        p.x += (p.x - 448.0) * u_breath * bW;
        p.y -= u_breath * 400.0 * bW;
    }

    // 2. Arm Gestures
    float distL = distance(p, u_shoulderL);
    if(distL < 350.0 && p.x < u_head_center.x && p.y > u_shoulderL.y - 50.0) {
        float wL = clamp(1.0 - distL/350.0, 0.0, 1.0);
        wL = smoothstep(0.0, 1.0, wL);
        p = mix(p, rotateAround(p, u_shoulderL, u_armL_angle), wL);
    }
    float distR = distance(p, u_shoulderR);
    if(distR < 350.0 && p.x > u_head_center.x && p.y > u_shoulderR.y - 50.0) {
        float wR = clamp(1.0 - distR/350.0, 0.0, 1.0);
        wR = smoothstep(0.0, 1.0, wR);
        p = mix(p, rotateAround(p, u_shoulderR, u_armR_angle), wR);
    }

    // 3. Head Sway
    float distH = distance(p, u_head_center);
    if(p.y < u_shoulderL.y + 50.0) {
        float wH = clamp(1.0 - (p.y - (u_shoulderL.y-100.0))/150.0, 0.0, 1.0);
        wH = smoothstep(0.0, 1.0, wH);
        p = mix(p, rotateAround(p, u_head_center, u_head_angle), wH);
    }

    // 4. Jaw / Lip Sync
    float distJ = distance(p, u_jaw);
    if(distJ < 100.0 && p.y > u_jaw.y - 30.0) {
        float wJ = clamp(1.0 - distJ/100.0, 0.0, 1.0);
        wJ = wJ * wJ * (3.0 - 2.0 * wJ);
        p.y += u_jaw_drop * wJ;
    }

    // 5. Blinking (Squash Y towards center of eyes)
    float distEL = distance(p, u_eyeL);
    if(distEL < 40.0) {
        float wE = clamp(1.0 - distEL/40.0, 0.0, 1.0);
        p.y = mix(p.y, u_eyeL.y, wE * u_blink);
    }
    float distER = distance(p, u_eyeR);
    if(distER < 40.0) {
        float wE = clamp(1.0 - distER/40.0, 0.0, 1.0);
        p.y = mix(p.y, u_eyeR.y, wE * u_blink);
    }

    // Transform to clip space
    vec2 final_p = p * u_scale + u_off;
    vec2 c = (final_p / u_res) * 2.0 - 1.0;
    c.y = -c.y;
    gl_Position = vec4(c, 0.0, 1.0);
    v_uv = a_uv;
}`;

const FS = `
precision mediump float;
varying vec2 v_uv;
uniform sampler2D u_tex;
void main(){
    gl_FragColor = texture2D(u_tex, v_uv);
}`;

// --- State ---
let gl, program;
let u_res, u_off, u_scale, u_tex;
let u_head_center, u_head_angle, u_shoulderL, u_shoulderR, u_armL_angle, u_armR_angle;
let u_jaw, u_jaw_drop, u_eyeL, u_eyeR, u_blink, u_breath;

let imgW = 896, imgH = 1200, renderScale = 1, offX = 0, offY = 0;
let texture;
let lastT = 0, time = 0;

// Rig logic
let isSpeaking = false, speakText = '', textIdx = 0, charTimer = 0;
let currentState = 'idle';
let blinkTimer = 0, nextBlink = 3 + Math.random()*3, blinkPhase = 0;

// Bones targets
let targetArmL = 0, valArmL = 0;
let targetArmR = 0, valArmR = 0;
let targetJaw = 0, valJaw = 0;
let targetHead = 0, valHead = 0;

// Viseme mapping (jaw drop in pixels)
const visemes = {
    'rest': 0, 'aa': 18, 'ee': 8, 'oh': 22, 'oo': 12,
    'ff': 6, 'mm': 0, 'ss': 5, 'th': 10
};
const charToViseme = {
    'a':'aa','e':'ee','i':'ee','o':'oh','u':'oo',
    'b':'mm','m':'mm','p':'mm','f':'ff','v':'ff',
    's':'ss','z':'ss','c':'ss','x':'ss','w':'oo',
    'r':'oh','q':'oo','d':'th','t':'th','n':'th',
    'l':'th','g':'ss','k':'ss','j':'ee','y':'ee',
    'h':'aa',' ':'rest',',':'rest','.':'rest'
};

function initGL(img) {
    const canvas = document.getElementById('c');
    gl = canvas.getContext('webgl', {antialias: true});
    if(!gl) return false;

    function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src); gl.compileShader(s);
        if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
        return s;
    }
    program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(program);
    gl.useProgram(program);

    // Geometry
    const pos = [], uv = [], idx = [];
    for(let j=0; j<=GRID_H; j++){
        for(let i=0; i<=GRID_W; i++){
            pos.push((i/GRID_W)*img.width, (j/GRID_H)*img.height);
            uv.push(i/GRID_W, j/GRID_H);
        }
    }
    for(let j=0; j<GRID_H; j++){
        for(let i=0; i<GRID_W; i++){
            let n = j*(GRID_W+1)+i;
            idx.push(n, n+1, n+GRID_W+1);
            idx.push(n+1, n+GRID_W+2, n+GRID_W+1);
        }
    }

    const posBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pos), gl.STATIC_DRAW);
    const a_pos = gl.getAttribLocation(program, 'a_pos');
    gl.enableVertexAttribArray(a_pos);
    gl.vertexAttribPointer(a_pos, 2, gl.FLOAT, false, 0, 0);

    const uvBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(uv), gl.STATIC_DRAW);
    const a_uv = gl.getAttribLocation(program, 'a_uv');
    gl.enableVertexAttribArray(a_uv);
    gl.vertexAttribPointer(a_uv, 2, gl.FLOAT, false, 0, 0);

    const idxBuf = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idx), gl.STATIC_DRAW);

    texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

    // Uniforms
    u_res = gl.getUniformLocation(program, 'u_res');
    u_off = gl.getUniformLocation(program, 'u_off');
    u_scale = gl.getUniformLocation(program, 'u_scale');
    
    u_head_center = gl.getUniformLocation(program, 'u_head_center');
    u_head_angle = gl.getUniformLocation(program, 'u_head_angle');
    u_shoulderL = gl.getUniformLocation(program, 'u_shoulderL');
    u_shoulderR = gl.getUniformLocation(program, 'u_shoulderR');
    u_armL_angle = gl.getUniformLocation(program, 'u_armL_angle');
    u_armR_angle = gl.getUniformLocation(program, 'u_armR_angle');
    u_jaw = gl.getUniformLocation(program, 'u_jaw');
    u_jaw_drop = gl.getUniformLocation(program, 'u_jaw_drop');
    u_eyeL = gl.getUniformLocation(program, 'u_eyeL');
    u_eyeR = gl.getUniformLocation(program, 'u_eyeR');
    u_blink = gl.getUniformLocation(program, 'u_blink');
    u_breath = gl.getUniformLocation(program, 'u_breath');

    // Set static uniforms (based on 896x1200 presenter_base.jpg)
    gl.uniform2f(u_head_center, 456, 356); // Nose
    gl.uniform2f(u_shoulderL, 313, 540);
    gl.uniform2f(u_shoulderR, 582, 540);
    gl.uniform2f(u_jaw, 456, 437);
    gl.uniform2f(u_eyeL, 419, 319);
    gl.uniform2f(u_eyeR, 493, 319);

    return idx.length;
}

function resize(){
    const canvas = document.getElementById('c');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    const sx = canvas.width / imgW, sy = canvas.height / imgH;
    renderScale = Math.min(sx, sy);
    offX = (canvas.width - imgW * renderScale) / 2;
    offY = (canvas.height - imgH * renderScale) / 2;
}

function updatePhysics(dt) {
    // Blinking
    let blinkVal = 0.0;
    if(blinkPhase === 0) {
        blinkTimer += dt;
        if(blinkTimer >= nextBlink) { blinkPhase = 0.01; blinkTimer = 0; }
    } else {
        blinkPhase += dt * 7;
        blinkVal = (blinkPhase < 0.25) ? blinkPhase/0.25 : 
                   (blinkPhase < 0.5) ? 1.0 : 1.0 - (blinkPhase-0.5)/0.5;
        if(blinkPhase >= 1.0) { blinkPhase = 0; nextBlink = 2 + Math.random()*4; }
    }

    // Speaking Lip Sync
    let ring = document.getElementById('speak-ring');
    if(!isSpeaking) {
        targetJaw = 0;
        targetArmL = 0; targetArmR = 0;
        ring.classList.remove('active');
    } else {
        ring.classList.add('active');
        charTimer += dt;
        if(charTimer >= 1/CHARS_PER_SEC) {
            charTimer = 0;
            if(textIdx < speakText.length) {
                let ch = speakText[textIdx].toLowerCase();
                let v = charToViseme[ch] || 'ss';
                targetJaw = visemes[v] || 0;
                textIdx++;
            } else {
                targetJaw = visemes[['aa','mm','rest','oh'][Math.floor(time*4)%4]];
            }
        }
        
        // Random subtle gestures while speaking
        if(Math.random() < 0.02) {
            targetArmL = (Math.random() - 0.5) * 0.15;
            targetArmR = (Math.random() - 0.5) * 0.15;
        }
    }

    // Head state
    if(currentState === 'thinking') targetHead = 0.08;
    else if(currentState === 'listening') targetHead = Math.sin(time*2)*0.03;
    else targetHead = Math.sin(time*0.8)*0.02; // idle sway

    // Interpolate
    valJaw += (targetJaw - valJaw) * 0.4;
    valArmL += (targetArmL - valArmL) * 0.05;
    valArmR += (targetArmR - valArmR) * 0.05;
    valHead += (targetHead - valHead) * 0.05;

    let breath = Math.sin(time * 1.5) * 0.005;

    gl.uniform1f(u_blink, blinkVal);
    gl.uniform1f(u_jaw_drop, valJaw);
    gl.uniform1f(u_breath, breath);
    gl.uniform1f(u_head_angle, valHead);
    gl.uniform1f(u_armL_angle, valArmL);
    gl.uniform1f(u_armR_angle, valArmR);
}

let indexCount = 0;
function render(t) {
    const dt = Math.min((t - lastT)/1000, 0.05); lastT = t; time += dt;
    
    updatePhysics(dt);

    gl.clearColor(0.047, 0.055, 0.149, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.uniform2f(u_res, gl.canvas.width, gl.canvas.height);
    gl.uniform2f(u_off, offX, offY);
    gl.uniform1f(u_scale, renderScale);

    gl.drawElements(gl.TRIANGLES, indexCount, gl.UNSIGNED_SHORT, 0);
    requestAnimationFrame(render);
}

window.avatarAPI = {
    setSpeaking: (val) => { isSpeaking = !!val; },
    setText: (text) => { speakText = text; textIdx = 0; charTimer = 0; },
    setState: (state) => { currentState = state; }
};

const img = new Image();
img.onload = () => {
    imgW = img.width; imgH = img.height;
    indexCount = initGL(img);
    if(indexCount) {
        resize();
        window.addEventListener('resize', resize);
        requestAnimationFrame(render);
    }
};
img.src = imgPath;
</script>
</body>
</html>
