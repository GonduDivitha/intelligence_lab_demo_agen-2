<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e26;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background:radial-gradient(ellipse at 50% 45%,rgba(50,80,180,0.08) 0%,transparent 60%)}
#speak-ring{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  opacity:0;transition:opacity 0.5s;
  background:radial-gradient(ellipse at 50% 50%,transparent 36%,rgba(80,140,255,0.15) 42%,transparent 48%);
  animation:pulseRing 2.5s ease-in-out infinite}
@keyframes pulseRing{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
#speak-ring.active{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="glow"></div>
<div id="speak-ring"></div>
<script>
// =====================================================================
//  COMBINED ENGINE: Sprite Gesture Crossfade + WebGL Mesh Deformation
//
//  This engine delivers VISIBLE, DYNAMIC animation by combining:
//   1. Pose sprite crossfade — switches between pre-generated Pixar
//      poses with different hand gestures (clearly visible body motion)
//   2. WebGL mesh deformation — deforms face vertices on the blended
//      image for lip sync, blinks, eyebrow emphasis (facial detail)
//
//  Result: the character visibly moves her hands, changes gestures,
//  and her face smoothly animates with lip sync and blinking.
// =====================================================================

const GRID_W = 30, GRID_H = 40;
const CHARS_PER_SEC = 13;

// ── Pose image library ───────────────────────────────────────────────
const POSE_PATHS = {
  idle:       'assets/poses/idle.jpg',
  speaking:   'assets/poses/speaking.jpg',
  pointing:   'assets/poses/pointing.jpg',
  blinking:   'assets/poses/blinking.jpg',
  mouth_wide: 'assets/poses/mouth_wide.jpg',
  mouth_o:    'assets/poses/mouth_o.jpg',
  both_hands: 'assets/poses/gesture_both_hands.jpg',
  mouth_closed:'assets/poses/mouth_closed.jpg',
};

// Gesture rotation sequences
const SPEAK_GESTURES = ['speaking','both_hands','mouth_wide','pointing','mouth_o','speaking','both_hands'];
const IDLE_GESTURES  = ['idle','mouth_closed'];
const GESTURE_INTERVAL = 2.2; // seconds between gesture switches

// ── Shaders ──────────────────────────────────────────────────────────
const VS = `
attribute vec2 a_pos;
attribute vec2 a_uv;
uniform vec2 u_res;
uniform vec2 u_off;
uniform float u_scale;
varying vec2 v_uv;
void main(){
  vec2 p = a_pos * u_scale + u_off;
  vec2 c = (p / u_res) * 2.0 - 1.0;
  c.y = -c.y;
  gl_Position = vec4(c, 0.0, 1.0);
  v_uv = a_uv;
}`;

// Fragment shader: blend between two pose textures
const FS = `
precision mediump float;
varying vec2 v_uv;
uniform sampler2D u_tex1;
uniform sampler2D u_tex2;
uniform float u_blend;
void main(){
  vec4 c1 = texture2D(u_tex1, v_uv);
  vec4 c2 = texture2D(u_tex2, v_uv);
  gl_FragColor = mix(c1, c2, u_blend);
}`;

// ── State ────────────────────────────────────────────────────────────
let gl, program, posBuf, uvBuf, idxBuf;
let a_pos, a_uv, u_res, u_off, u_scale, u_tex1, u_tex2, u_blend;
let imgW = 896, imgH = 1200, renderScale = 1, offX = 0, offY = 0;
let basePos = [], curPos = [], uvs = [], indices = [];
let posF32, uvF32, idxU16;
let lastT = 0, time = 0;

// Textures
const textures = {};
let loadedCount = 0, totalToLoad = Object.keys(POSE_PATHS).length;

// Pose crossfade
let currentPose = 'idle', targetPose = 'idle';
let blendValue = 1.0;   // 0 = showing current, 1 = showing target
let blendSpeed = 0.04;   // ~400ms crossfade

// Gesture rotation
let gestureTimer = 0, gestureIndex = 0;

// Animation
let isSpeaking = false, speakText = '', textIdx = 0, charTimer = 0;
let targetViseme = 'rest', currentState = 'idle';
let blinkTimer = 0, nextBlink = 3 + Math.random()*3, blinkPhase = 0;

// ── Bone Definitions (precise landmarks from 896x1200 image) ─────────
const bones = [
  {name:'jaw',     cx:0.509,cy:0.365,r:0.065,dx:0,  dy:18, mask:'below', val:0, target:0},
  {name:'loLip',   cx:0.509,cy:0.340,r:0.030,dx:0,  dy:12, mask:'below', val:0, target:0},
  {name:'upLip',   cx:0.509,cy:0.320,r:0.022,dx:0,  dy:-5, mask:'above', val:0, target:0},
  {name:'strL',    cx:0.475,cy:0.328,r:0.020,dx:-6,  dy:0, mask:'all',   val:0, target:0},
  {name:'strR',    cx:0.543,cy:0.328,r:0.020,dx:6,   dy:0, mask:'all',   val:0, target:0},
  {name:'pucker',  cx:0.509,cy:0.328,r:0.035,dx:0,  dy:0,  mask:'all',   val:0, target:0, special:'pucker'},
  {name:'blinkL',  cx:0.468,cy:0.266,r:0.025,dx:0,  dy:10, mask:'above', val:0, target:0},
  {name:'blinkR',  cx:0.550,cy:0.266,r:0.025,dx:0,  dy:10, mask:'above', val:0, target:0},
  {name:'browL',   cx:0.460,cy:0.246,r:0.022,dx:0,  dy:-4, mask:'all',   val:0, target:0},
  {name:'browR',   cx:0.558,cy:0.246,r:0.022,dx:0,  dy:-4, mask:'all',   val:0, target:0},
  {name:'cheekL',  cx:0.427,cy:0.297,r:0.028,dx:-2, dy:2,  mask:'all',   val:0, target:0},
  {name:'cheekR',  cx:0.591,cy:0.297,r:0.028,dx:2,  dy:2,  mask:'all',   val:0, target:0},
];
const boneMap = {};
bones.forEach(b => boneMap[b.name] = b);

// ── Viseme Definitions ───────────────────────────────────────────────
const visemes = {
  rest: {jaw:0, loLip:0, upLip:0, strL:0, strR:0, pucker:0, cheekL:0, cheekR:0},
  aa:   {jaw:0.7, loLip:0.5, upLip:0.25, strL:0.15, strR:0.15, pucker:0, cheekL:0.2, cheekR:0.2},
  ee:   {jaw:0.2, loLip:0.15, upLip:0.08, strL:0.5, strR:0.5, pucker:0, cheekL:0.3, cheekR:0.3},
  oh:   {jaw:0.5, loLip:0.3, upLip:0.1, strL:0, strR:0, pucker:0.5, cheekL:0.1, cheekR:0.1},
  oo:   {jaw:0.25, loLip:0.15, upLip:0.05, strL:0, strR:0, pucker:0.7, cheekL:0, cheekR:0},
  ff:   {jaw:0.04, loLip:0.15, upLip:0.2, strL:0.05, strR:0.05, pucker:0, cheekL:0, cheekR:0},
  mm:   {jaw:0, loLip:0, upLip:0, strL:0, strR:0, pucker:0.15, cheekL:0, cheekR:0},
  ss:   {jaw:0.08, loLip:0.04, upLip:0.04, strL:0.2, strR:0.2, pucker:0, cheekL:0.1, cheekR:0.1},
  th:   {jaw:0.12, loLip:0.1, upLip:0.08, strL:0.1, strR:0.1, pucker:0, cheekL:0, cheekR:0},
};

const charToViseme = {
  a:'aa',e:'ee',i:'ee',o:'oh',u:'oo',
  b:'mm',m:'mm',p:'mm',
  f:'ff',v:'ff',
  s:'ss',z:'ss',c:'ss',x:'ss',
  w:'oo',r:'oh',q:'oo',
  d:'th',t:'th',n:'th',l:'th',
  g:'ss',k:'ss',j:'ee',y:'ee',h:'aa',
  ' ':'rest',',':'rest','.':'rest','!':'rest','?':'rest',
};

// ── Mesh Generation ──────────────────────────────────────────────────
function createMesh(w, h){
  for(let j=0;j<=GRID_H;j++){
    for(let i=0;i<=GRID_W;i++){
      const u=i/GRID_W, v=j/GRID_H;
      basePos.push(u*w, v*h);
      curPos.push(u*w, v*h);
      uvs.push(u, v);
    }
  }
  for(let j=0;j<GRID_H;j++){
    for(let i=0;i<GRID_W;i++){
      const idx=j*(GRID_W+1)+i;
      indices.push(idx, idx+1, idx+GRID_W+1);
      indices.push(idx+1, idx+GRID_W+2, idx+GRID_W+1);
    }
  }
  posF32=new Float32Array(curPos);
  uvF32=new Float32Array(uvs);
  idxU16=new Uint16Array(indices);
}

// ── WebGL Setup ──────────────────────────────────────────────────────
function initGL(){
  const canvas=document.getElementById('c');
  gl=canvas.getContext('webgl',{alpha:false,antialias:true});
  if(!gl) return false;

  function compile(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  program=gl.createProgram();
  gl.attachShader(program,compile(gl.VERTEX_SHADER,VS));
  gl.attachShader(program,compile(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(program);
  gl.useProgram(program);

  a_pos=gl.getAttribLocation(program,'a_pos');
  a_uv=gl.getAttribLocation(program,'a_uv');
  u_res=gl.getUniformLocation(program,'u_res');
  u_off=gl.getUniformLocation(program,'u_off');
  u_scale=gl.getUniformLocation(program,'u_scale');
  u_tex1=gl.getUniformLocation(program,'u_tex1');
  u_tex2=gl.getUniformLocation(program,'u_tex2');
  u_blend=gl.getUniformLocation(program,'u_blend');

  posBuf=gl.createBuffer();
  uvBuf=gl.createBuffer();
  idxBuf=gl.createBuffer();

  gl.bindBuffer(gl.ARRAY_BUFFER,uvBuf);
  gl.bufferData(gl.ARRAY_BUFFER,uvF32,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,idxU16,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.bufferData(gl.ARRAY_BUFFER,posF32,gl.DYNAMIC_DRAW);
  return true;
}

function createTexture(img){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  return tex;
}

function resize(){
  const canvas=document.getElementById('c');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  gl.viewport(0,0,canvas.width,canvas.height);
  const sx=canvas.width/imgW, sy=canvas.height/imgH;
  renderScale=Math.min(sx,sy);
  offX=(canvas.width-imgW*renderScale)/2;
  offY=(canvas.height-imgH*renderScale)/2;
}

// ── Pose Crossfade ───────────────────────────────────────────────────
function switchPose(newPose){
  if(newPose===targetPose) return;
  if(!textures[newPose]) return;
  currentPose=targetPose;
  targetPose=newPose;
  blendValue=0;
  blendSpeed=0.04; // normal ~400ms
}

function switchPoseFast(newPose){
  if(newPose===targetPose) return;
  if(!textures[newPose]) return;
  currentPose=targetPose;
  targetPose=newPose;
  blendValue=0;
  blendSpeed=0.15; // fast ~100ms for blinks
}

// ── Deformation Engine ───────────────────────────────────────────────
function applyDeformations(){
  for(let k=0;k<basePos.length;k++) curPos[k]=basePos[k];

  // 1. Apply bones
  for(const bone of bones){
    if(Math.abs(bone.val)<0.001) continue;
    const cx=bone.cx*imgW, cy=bone.cy*imgH, r=bone.r*imgH;
    for(let k=0;k<curPos.length;k+=2){
      const bx=basePos[k], by=basePos[k+1];
      if(bone.mask==='below' && by<cy) continue;
      if(bone.mask==='above' && by>cy) continue;
      const ddx=bx-cx, ddy=by-cy;
      const dist=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dist>r) continue;
      const t=1-dist/r, w=t*t*(3-2*t);
      if(bone.special==='pucker'){
        curPos[k]+=(cx-bx)*w*bone.val*0.25;
      } else {
        curPos[k]+=bone.dx*bone.val*w;
        curPos[k+1]+=bone.dy*bone.val*w;
      }
    }
  }

  // 2. Breathing
  const breathVal=Math.sin(time*1.2)*0.002;
  for(let k=0;k<curPos.length;k+=2){
    const ny=basePos[k+1]/imgH;
    if(ny>0.389){
      const bw=(ny-0.389)*1.5, nx=basePos[k]/imgW;
      curPos[k]+=(nx-0.5)*imgW*breathVal*bw;
      curPos[k+1]-=breathVal*imgH*bw*0.3;
    }
  }

  // 3. Head sway
  const swayA=Math.sin(time*0.6)*0.0018;
  const tiltA=currentState==='thinking'?0.006:(currentState==='listening'?Math.sin(time*2)*0.003:0);
  const ang=swayA+tiltA;
  const hcx=0.509*imgW, hcy=0.297*imgH;
  const cosA=Math.cos(ang), sinA=Math.sin(ang);
  for(let k=0;k<curPos.length;k+=2){
    if(basePos[k+1]/imgH<0.389){
      const dx=curPos[k]-hcx, dy=curPos[k+1]-hcy;
      curPos[k]=hcx+dx*cosA-dy*sinA;
      curPos[k+1]=hcy+dx*sinA+dy*cosA;
    }
  }

  posF32.set(curPos);
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,posF32);
}

// ── Animation Updates ────────────────────────────────────────────────
function updateBones(dt){
  const vis=visemes[targetViseme]||visemes.rest;
  const speed=isSpeaking?0.22:0.12;
  for(const bone of bones){
    if(bone.name==='blinkL'||bone.name==='blinkR'||bone.name==='browL'||bone.name==='browR') continue;
    bone.target=vis[bone.name]||0;
    bone.val+=(bone.target-bone.val)*speed;
  }
  boneMap.blinkL.val+=(boneMap.blinkL.target-boneMap.blinkL.val)*0.35;
  boneMap.blinkR.val+=(boneMap.blinkR.target-boneMap.blinkR.val)*0.35;
  boneMap.browL.val+=(boneMap.browL.target-boneMap.browL.val)*0.1;
  boneMap.browR.val+=(boneMap.browR.target-boneMap.browR.val)*0.1;
}

function updateBlink(dt){
  if(blinkPhase===0){
    blinkTimer+=dt;
    if(blinkTimer>=nextBlink){
      blinkPhase=0.01; blinkTimer=0;
      nextBlink=3+Math.random()*3;
      // Switch to blinking pose for visible eye close
      switchPoseFast('blinking');
    }
  } else {
    blinkPhase+=dt*6;
    boneMap.blinkL.target=blinkPhase<0.5?1:0;
    boneMap.blinkR.target=blinkPhase<0.5?1:0;
    if(blinkPhase>=1){
      blinkPhase=0;
      boneMap.blinkL.target=0;
      boneMap.blinkR.target=0;
      // Return from blink to previous pose
      const returnPose = isSpeaking ? SPEAK_GESTURES[gestureIndex % SPEAK_GESTURES.length] : 'idle';
      switchPoseFast(returnPose);
    }
  }
}

function updateGestures(dt){
  if(!isSpeaking){
    // Idle: switch between idle poses slowly
    gestureTimer+=dt;
    if(gestureTimer>=5){
      gestureTimer=0;
      gestureIndex=(gestureIndex+1)%IDLE_GESTURES.length;
      switchPose(IDLE_GESTURES[gestureIndex]);
    }
    return;
  }

  // Speaking: rotate through gestures
  gestureTimer+=dt;
  if(gestureTimer>=GESTURE_INTERVAL){
    gestureTimer=0;
    gestureIndex=(gestureIndex+1)%SPEAK_GESTURES.length;
    if(blinkPhase===0){ // don't interrupt blinks
      switchPose(SPEAK_GESTURES[gestureIndex]);
    }
  }
}

function updateSpeaking(dt){
  const ring=document.getElementById('speak-ring');
  if(!isSpeaking){
    targetViseme='rest';
    ring.classList.remove('active');
    boneMap.browL.target*=0.92;
    boneMap.browR.target*=0.92;
    return;
  }
  ring.classList.add('active');

  charTimer+=dt;
  if(charTimer>=1/CHARS_PER_SEC){
    charTimer=0;
    if(speakText && textIdx<speakText.length){
      const ch=speakText[textIdx].toLowerCase();
      targetViseme=charToViseme[ch]||'ss';
      if(textIdx>0 && speakText[textIdx-1]===' '){
        boneMap.browL.target=0.35+Math.random()*0.15;
        boneMap.browR.target=0.35+Math.random()*0.15;
      }
      textIdx++;
    } else {
      const cycle=['aa','ss','ee','rest','oh','ss','aa','mm','ee','th'];
      targetViseme=cycle[Math.floor(Date.now()/(1000/CHARS_PER_SEC))%cycle.length];
      if(Math.random()<0.08){
        boneMap.browL.target=0.25;
        boneMap.browR.target=0.25;
      }
    }
  }
  boneMap.browL.target*=0.96;
  boneMap.browR.target*=0.96;
}

// ── Render Loop ──────────────────────────────────────────────────────
function render(t){
  const dt=Math.min((t-lastT)/1000, 0.05); lastT=t; time+=dt;

  // Update crossfade
  if(blendValue<1) blendValue=Math.min(1, blendValue+blendSpeed);

  updateBlink(dt);
  updateGestures(dt);
  updateSpeaking(dt);
  updateBones(dt);
  applyDeformations();

  gl.clearColor(0.047,0.055,0.149,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(program);

  gl.uniform2f(u_res,gl.canvas.width,gl.canvas.height);
  gl.uniform2f(u_off,offX,offY);
  gl.uniform1f(u_scale,renderScale);

  // Bind position
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.enableVertexAttribArray(a_pos);
  gl.vertexAttribPointer(a_pos,2,gl.FLOAT,false,0,0);

  // Bind UV
  gl.bindBuffer(gl.ARRAY_BUFFER,uvBuf);
  gl.enableVertexAttribArray(a_uv);
  gl.vertexAttribPointer(a_uv,2,gl.FLOAT,false,0,0);

  // Bind textures: current pose on unit 0, target pose on unit 1
  const tex1 = textures[currentPose] || textures['idle'];
  const tex2 = textures[targetPose] || textures['idle'];

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex1);
  gl.uniform1i(u_tex1, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, tex2);
  gl.uniform1i(u_tex2, 1);

  gl.uniform1f(u_blend, blendValue);

  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
  gl.drawElements(gl.TRIANGLES,indices.length,gl.UNSIGNED_SHORT,0);

  requestAnimationFrame(render);
}

// ── Public API ───────────────────────────────────────────────────────
window.avatarAPI = {
  setSpeaking(val){
    const was = isSpeaking;
    isSpeaking=!!val;
    if(val && !was){
      gestureTimer=0; gestureIndex=0;
      switchPose(SPEAK_GESTURES[0]);
    }
    if(!val && was){
      switchPose('idle');
      gestureTimer=0; gestureIndex=0;
    }
  },
  setText(text){ speakText=text; textIdx=0; charTimer=0; },
  setState(state){ currentState=state; },
  triggerBlink(){ if(blinkPhase===0){blinkPhase=0.01;blinkTimer=0;} },
  setViseme(name){ targetViseme=name; },
};

// ── Load All Pose Images ─────────────────────────────────────────────
function loadAllPoses(){
  let firstImg = null;
  for(const [name, path] of Object.entries(POSE_PATHS)){
    const img = new Image();
    img.onload = function(){
      if(!firstImg){
        firstImg = img;
        imgW = img.width; imgH = img.height;
        createMesh(imgW, imgH);
        if(!initGL()) return;
        resize();
        window.addEventListener('resize', resize);
      }
      textures[name] = createTexture(img);
      loadedCount++;
      if(loadedCount >= totalToLoad){
        // All loaded — start rendering
        requestAnimationFrame(render);
      }
    };
    img.onerror = function(){
      console.warn('Failed to load pose:', name, path);
      loadedCount++;
      if(loadedCount >= totalToLoad && Object.keys(textures).length > 0){
        requestAnimationFrame(render);
      }
    };
    img.src = path;
  }
}

loadAllPoses();
</script>
</body>
</html>
